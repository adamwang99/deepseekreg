name: Create DeepSeek Accounts

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of accounts'
        required: true
        default: '9'
        type: string
      password:
        description: 'Password for all accounts'
        required: true
        default: 'abcABC123@@'
        type: string

jobs:
  create-accounts:
    name: Create DeepSeek Account
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: [
          "newdelhi.io.vn",
          "mailo.edu.pl",
          "nik.edu.pl",
          "gddp2018.edu.vn",
          "itmo.edu.pl",
          "mailer.edu.pl",
          "newyork.io.vn",
          "dulieu.io.vn",
          "jakarta.io.vn"
        ]
      fail-fast: false
      max-parallel: 9

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium
          sudo apt-get install -y -qq xvfb

      - name: Register
        id: register
        env:
          DS_PASSWORD: ${{ inputs.password || 'abcABC123@@' }}
          DS_DOMAIN: ${{ matrix.domain }}
        run: xvfb-run python register_account.py

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-${{ matrix.domain }}
          path: accounts.txt
          if-no-files-found: ignore

  collect:
    name: Collect accounts
    needs: [create-accounts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Combine
        run: |
          echo "# DeepSeek Accounts" > all_accounts.txt
          echo "# Password: ${{ inputs.password || 'abcABC123@@' }}" >> all_accounts.txt
          echo "---" >> all_accounts.txt
          find artifacts -name "accounts.txt" -exec cat {} \; | sort -u >> all_accounts.txt
          cat all_accounts.txt
      - uses: actions/upload-artifact@v4
        with:
          name: all-accounts
          path: all_accounts.txt
